<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코난 맞추기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .quiz-container {
            max-width: 500px;
            margin: 30px auto;
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .quiz-img {
            max-height: 250px;
            object-fit: contain;
            border: 3px solid #00d4ff;
            background: #0f3460;
        }
    </style>
</head>

<body>
<div id="quiz-container" class="quiz-container text-center" style="display: none;">
    <h3 class="mb-4 text-info fw-bold">정답을 맞혀봐!</h3>
    
    <div class="image-box mb-4">
        <img id="quiz-image"
             src="{{ url_for('static', filename='images/' + quiz_data.eye_image) }}"
             class="img-fluid rounded quiz-img">
    </div>

    <div class="mb-3">
        <input type="text"
               id="user-answer"
               class="form-control form-control-lg text-center"
               placeholder="캐릭터 이름 입력">
    </div>

    <button id="submit-btn" onclick="submitAnswer()" class="btn btn-primary btn-lg w-100 fw-bold">
        정답 제출 
    </button>

    <div id="result-box" class="mt-4"></div>

    <button id="next-btn"
            onclick="nextQuiz()"
            class="btn btn-warning btn-lg mt-3 w-100 fw-bold text-dark"
            style="display:none;">
        다음 문제로 ▶
    </button>
</div>

<script src="{{ url_for('static', filename='js/quiz.js') }}"></script>

<script>
    document.getElementById("user-answer")
        .addEventListener("keydown", function(event) {

        if (event.key === "Enter") {
            submitAnswer();
        }
    });
    
    window.addEventListener('DOMContentLoaded', () => {
        const quizImg = document.getElementById('quiz-image');
        
        // 이미 캐싱되었거나 이미 로드가 완료된 상태라면 즉시 보여줌
        if (quizImg.complete) {
            document.getElementById('quiz-container').style.display = 'block';
        } else {
            // 다운로드 중이라면 로드가 끝나는 순간 보여줌
            quizImg.addEventListener('load', () => {
                document.getElementById('quiz-container').style.display = 'block';
            });
        }
    });
</script>
</body>
</html>
