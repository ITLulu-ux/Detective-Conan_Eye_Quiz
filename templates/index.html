<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코난 맞추기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a2e; 
            color: white; 
            padding: 20px; 
        }
        .main-container {
            max-width: 600px;
            margin: 50px auto;
            background: #16213e; 
            border-radius: 12px; 
            padding: 40px; 
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        h1 { 
            color: #00d4ff; 
            margin-bottom: 30px;
            font-weight: bold;
        }
        .rules-box {
            background: #0f3460;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 30px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
        }
    </style>
    <link rel="shortcut icon"
          href="{{ url_for(
          'static',
          filename='favicon.ico'
          ) }}">
</head>
<body>
<!--Gemini-->
<div class="main-container">
    <h1>코난 눈 맞추기 퀴즈</h1>
    
    <!-- 규칙 설명 파트 -->
    <div class="rules-box">
        <p class="mb-1 class text-white fw-bold"> [게임 규칙]</p>
        <p class="mb-1">1. 제시된 캐릭터의 눈과 눈썹을 보고 누구인지 맞혀야 합니다.</p>
        <p class="mb-1">2. 허용 언어: 일본 이름(한글표기), English</p>
        <p class="mb-0">3. <strong>주의:</strong> 코드네임이 있는 캐릭터는 코드네임과 이름을 함께 입력해야 정답 처리됩니다.</p>
    </div>

    <!-- 파이썬 서버로 문제 개수를 넘겨주는 폼 -->
    <form action="/quiz" method="GET">
        <div class="mb-4">
            <label for="countSelect" class="form-label text-info fw-bold">풀고 싶은 문제 개수를 선택하세요</label>
            <select class="form-select text-center bg-dark text-white border-secondary" id="countSelect" name="count">
                <option value="3">3개 풀기</option>
                <option value="5">5개 풀기</option>
                <option value="10" selected>10개 풀기</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">퀴즈 시작하기 </button>
    </form>
</div>

</body>
</html>
